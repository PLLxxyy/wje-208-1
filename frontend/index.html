<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家庭相册共享</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #E74C3C;
      --primary-light: #ff6b6b;
      --primary-dark: #c0392b;
      --bg: #f5f5f7;
      --bg-card: #ffffff;
      --text: #333;
      --text-light: #777;
      --text-lighter: #aaa;
      --border: #eee;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea, select { font-family: inherit; }

    /* ── Layout ── */
    .app-header {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .app-header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }
    .app-header .logo-icon {
      font-size: 24px;
    }
    .app-header nav { display: flex; align-items: center; gap: 8px; }
    .app-header nav a,
    .app-header nav button {
      background: none;
      border: none;
      font-size: 14px;
      color: var(--text);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .app-header nav a:hover,
    .app-header nav button:hover {
      background: #f0f0f0;
    }
    .app-header nav .nav-user {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-light);
      margin-right: 8px;
    }
    .app-header .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
    }

    .main-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      min-height: calc(100vh - 56px);
    }

    /* ── Page Header ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .page-header .subtitle {
      color: var(--text-light);
      font-size: 14px;
      margin-top: 4px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      border: none;
      transition: all 0.2s;
      line-height: 1.5;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: #eee; }
    .btn-danger {
      background: #e74c3c;
      color: #fff;
    }
    .btn-danger:hover { background: #c0392b; }
    .btn-ghost {
      background: transparent;
      color: var(--text-light);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: #f8f8f8; color: var(--text); }
    .btn-sm { padding: 4px 10px; font-size: 13px; }
    .btn-lg { padding: 12px 28px; font-size: 16px; }

    /* ── Forms ── */
    .form-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px;
      max-width: 420px;
      width: 100%;
      margin: 0 auto;
    }
    .form-card h2 {
      font-size: 22px;
      text-align: center;
      margin-bottom: 24px;
      font-weight: 700;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-light);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
      background: #fafafa;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      border-color: var(--primary);
      background: #fff;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .form-actions {
      margin-top: 20px;
    }
    .form-actions .btn { width: 100%; }
    .form-link {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-light);
    }
    .form-link a {
      color: var(--primary);
      font-weight: 600;
    }
    .form-error {
      background: #fde8e8;
      color: #c0392b;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }

    /* ── Album Grid ── */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .album-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .album-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }
    .album-cover {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
      position: relative;
    }
    .album-cover .photo-count-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .album-info {
      padding: 16px;
    }
    .album-info h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .album-info .album-desc {
      font-size: 13px;
      color: var(--text-light);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .album-info .album-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      font-size: 12px;
      color: var(--text-lighter);
    }
    .album-info .album-creator {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .album-creator .mini-avatar {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 10px;
      font-weight: 600;
    }

    /* ── Photo Grid ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .photo-card {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .photo-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-hover);
    }
    .photo-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      position: relative;
    }
    .photo-thumb .slideshow-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .photo-card:hover .slideshow-btn { opacity: 1; }
    .photo-card-body {
      padding: 10px 12px;
    }
    .photo-card-body h4 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .photo-card-body .photo-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: var(--text-lighter);
    }
    .photo-card-body .photo-meta .meta-item {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* ── Photo Detail ── */
    .photo-detail-container {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .photo-detail-main {
      flex: 1;
      min-width: 300px;
    }
    .photo-detail-sidebar {
      width: 340px;
      min-width: 280px;
    }
    .photo-display {
      width: 100%;
      aspect-ratio: 4/3;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }
    .photo-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .like-btn {
      background: none;
      border: 2px solid var(--border);
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
      color: var(--text-light);
    }
    .like-btn.liked {
      border-color: var(--primary);
      color: var(--primary);
      background: #fde8e8;
    }
    .like-btn:hover {
      border-color: var(--primary);
    }
    .photo-description {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .photo-description h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }
    .photo-description .desc-text {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .photo-description .desc-meta {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-lighter);
    }

    /* ── Comments ── */
    .comments-section {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .comments-section h3 {
      font-size: 16px;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .comment-input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .comment-input-group input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px;
      outline: none;
    }
    .comment-input-group input:focus {
      border-color: var(--primary);
    }
    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 400px;
      overflow-y: auto;
    }
    .comment-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .comment-item .comment-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .comment-item .comment-body {
      flex: 1;
    }
    .comment-item .comment-user {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .comment-item .comment-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.5;
    }
    .comment-item .comment-time {
      font-size: 11px;
      color: var(--text-lighter);
      margin-top: 3px;
    }

    /* ── Slideshow ── */
    .slideshow-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .slideshow-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 90%;
      max-width: 900px;
    }
    .slideshow-image {
      width: 100%;
      aspect-ratio: 4/3;
      max-height: 65vh;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 120px;
      margin-bottom: 16px;
    }
    .slideshow-title {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
      text-align: center;
    }
    .slideshow-desc {
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      text-align: center;
      margin-bottom: 20px;
    }
    .slideshow-counter {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .slideshow-controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .slideshow-controls button {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .slideshow-controls button:hover {
      background: rgba(255,255,255,0.3);
    }
    .slideshow-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      font-size: 28px;
      cursor: pointer;
    }
    .slideshow-close:hover { color: #fff; }

    /* ── Upload ── */
    .upload-area {
      background: var(--bg-card);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
    }
    .upload-area:hover {
      border-color: var(--primary);
      background: #fef2f2;
    }
    .upload-area .upload-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .upload-area .upload-text {
      font-size: 15px;
      color: var(--text-light);
      margin-bottom: 4px;
    }
    .upload-area .upload-hint {
      font-size: 12px;
      color: var(--text-lighter);
    }
    .upload-preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .upload-preview-item {
      background: var(--bg-card);
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
    }
    .upload-preview-item .preview-img {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    .upload-preview-item .preview-remove {
      position: absolute;
      top: 6px;
      right: 6px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .upload-preview-item .preview-fields {
      padding: 10px;
    }
    .upload-preview-item .preview-fields input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 12px;
      margin-bottom: 6px;
      outline: none;
    }
    .upload-preview-item .preview-fields input:focus {
      border-color: var(--primary);
    }

    /* ── Profile ── */
    .profile-header {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }
    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .profile-info h2 {
      font-size: 22px;
      font-weight: 700;
    }
    .profile-info .profile-role {
      display: inline-block;
      background: #fde8e8;
      color: var(--primary);
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 4px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .stat-card .stat-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .stat-card .stat-number {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-card .stat-label {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* ── Admin ── */
    .admin-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .admin-tabs button {
      background: none;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-light);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .admin-tabs button.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .admin-table {
      width: 100%;
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .admin-table table {
      width: 100%;
      border-collapse: collapse;
    }
    .admin-table th,
    .admin-table td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }
    .admin-table th {
      background: #fafafa;
      font-weight: 600;
      color: var(--text-light);
      font-size: 13px;
    }
    .admin-table tr:hover td {
      background: #fafafa;
    }
    .admin-table .table-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      margin-right: 8px;
      vertical-align: middle;
    }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
    }
    .empty-state .empty-icon {
      font-size: 56px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    .empty-state h3 {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 8px;
    }
    .empty-state p {
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-light);
      font-size: 14px;
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 480px;
      width: 100%;
